<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card">
        <div class="card-body p-0">
          <!-- Video Player -->
          <div class="video-container">
            <video #videoPlayer class="w-100" (click)="togglePlay()">
              <source [src]="currentVideo.src" [type]="currentVideo.type">
              <track *ngFor="let track of currentVideo.tracks"
                     [src]="track.src"
                     [kind]="track.kind"
                     [srclang]="track.srclang"
                     [label]="track.label"
                     [default]="track.default">
              Your browser does not support HTML5 video.
            </video>

            <!-- Custom Controls -->
            <div class="video-controls bg-dark p-2">
              <!-- Play/Pause Button -->
              <button class="btn btn-sm btn-outline-light me-2" (click)="togglePlay()">
                <i class="bi" [ngClass]="{'bi-play-fill': !isPlaying, 'bi-pause-fill': isPlaying}"></i>
              </button>

              <!-- Progress Bar -->
              <div class="progress flex-grow-1 mx-2" style="height: 5px; cursor: pointer;">
                <div class="progress-bar bg-danger" role="progressbar"
                     [style.width]="(currentTime / duration * 100) + '%'"
                     (click)="seek($event)"></div>
              </div>

              <!-- Time Display -->
              <div class="text-white mx-2 small">
                {{ formatTime(currentTime) }} / {{ formatTime(duration) }}
              </div>

              <!-- Volume Control -->
              <div class="volume-control me-2">
                <button class="btn btn-sm btn-outline-light" (click)="toggleMute()">
                  <i class="bi" [ngClass]="{'bi-volume-up-fill': !isMuted, 'bi-volume-mute-fill': isMuted}"></i>
                </button>
                <input type="range" class="form-range" min="0" max="1" step="0.1"
                       [(ngModel)]="volume" (input)="setVolume()" style="width: 80px;">
              </div>

              <!-- Playback Speed -->
              <select class="form-select form-select-sm me-2" style="width: auto;"
                      [(ngModel)]="playbackRate" (change)="setPlaybackRate()">
                <option value="0.5">0.5x</option>
                <option value="0.75">0.75x</option>
                <option value="1" selected>1x</option>
                <option value="1.25">1.25x</option>
                <option value="1.5">1.5x</option>
                <option value="2">2x</option>
              </select>

              <!-- Captions -->
              <select class="form-select form-select-sm me-2" style="width: auto;"
                      (change)="toggleCaptions($event)">
                <option value="off">Captions Off</option>
                <option *ngFor="let track of currentVideo.tracks" [value]="track.srclang">
                  {{ track.label }}
                </option>
              </select>

              <!-- Chapters -->
              <select class="form-select form-select-sm me-2" style="width: auto;"
                      (change)="jumpToChapter($event)">
                <option value="">Chapters</option>
                <option *ngFor="let chapter of chapters" [value]="chapter.time">
                  {{ chapter.title }} ({{ formatTime(chapter.time) }})
                </option>
              </select>

              <!-- Fullscreen -->
              <button class="btn btn-sm btn-outline-light" (click)="toggleFullscreen()">
                <i class="bi bi-fullscreen"></i>
              </button>
            </div>
          </div>

          <!-- Video Selection -->
          <div class="mt-3">
            <label class="form-label">Select Video:</label>
            <select class="form-select" [(ngModel)]="selectedVideo" (change)="changeVideo()">
              <option *ngFor="let video of videoLibrary" [ngValue]="video">{{ video.title }}</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
