<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card">
        <div class="card-body p-0">
          <!-- Video Player -->
          <div class="video-container" @fadeInOut>
            <video #videoPlayer class="w-100" (click)="togglePlay()" >
              <source [src]="currentVideo.src" [type]="currentVideo.type">
              <!-- Only render tracks if they exist -->
              <ng-container *ngIf="currentVideo.tracks">
                <track *ngFor="let track of currentVideo.tracks"
                       [src]="track.src"
                       [kind]="track.kind"
                       [srclang]="track.srclang"
                       [label]="track.label"
                       [default]="track.default">
              </ng-container>
            </video>
            <!--directive version-->
            <audio #externalAudio [videoAudioSync]="videoPlayer" preload="auto" style="display: none"></audio>
            <!--service version-->
            <!--<audio #externalAudio preload="auto" style="display: none"></audio>-->
            <!-- Hidden video for preview thumbnails -->
            <video #thumbVideo [src]="currentVideo.src" preload="auto" muted style="display: none;"></video>
            <canvas #thumbCanvas
                    class="position-fixed border rounded shadow"
                    width="160" height="90"
                    style="transform: translateX(-50%); pointer-events: none; display: none; z-index: 1000;">
            </canvas>

            <!-- Custom Controls -->
            <div class="video-controls bg-dark p-2">
              <!-- Play/Pause Button -->
              <button class="btn btn-sm btn-dark me-2" (click)="togglePlay()">
                <i class="bi" [ngClass]="{'bi-play-fill': !isPlaying, 'bi-pause-fill': isPlaying}"></i>
              </button>

              <!-- Progress Bar -->
              <div #progressContainer
                   class="progress flex-grow-1 mx-2 position-relative"
                   style="height: 5px; cursor: pointer;"
                   (click)="seek($event)"
                   [progressTooltip]
                   [duration]="duration"
                   [videoElement]="videoPlayerRef"
                   [canvasElement]="thumbCanvas">
                <div class="progress-bar bg-danger"
                     [style.width.%]="(currentTime / duration * 100)">
                </div>
                <ng-template #tooltipContainer></ng-template>
                <div class="progress-bar bg-danger"
                     role="progressbar"
                     aria-valuemin="0" aria-valuemax="100"
                     [style.width.%]="(currentTime / duration * 100)">
                </div>

                <!-- Tooltip positioned absolutely based on mouse -->
                <div *ngIf="showHoverTime"
                     class="position-fixed bg-dark text-white px-2 py-1 rounded small"
                     [style.left.px]="tooltipGlobalX"
                     [style.top.px]="tooltipGlobalY"
                     style="transform: translateX(-50%); pointer-events: none; white-space: nowrap; z-index: 1000;">
                  {{ hoverTimeDisplay }}
                </div>
              </div>
              <!--Time Display-->
              <div class="text-white mx-2 small">
                {{ formatTime(currentTime) }} / {{ formatTime(duration) }}
              </div>

              <!-- Volume Control -->
              <div class="volume-control me-2">
                <button class="btn btn-sm btn-dark" (click)="toggleMute()">
                  <i class="bi" [ngClass]="{'bi-volume-up-fill': !isMuted, 'bi-volume-mute-fill': isMuted}"></i>
                </button>
                <input type="range" class="form-range" min="0" max="1" step="0.1"
                       [(ngModel)]="volume" (input)="setVolume()" style="width: 80px;">
              </div>

              <!-- Playback Speed -->
              <div class="dropdown">
                <button class="btn btn-sm btn-dark dropdown-toggle p-1 me-2"
                        #speedToggleBtn
                        type="button"
                        data-bs-toggle="dropdown"
                        aria-expanded="false"
                        title="Speed">
                  <i class="bi bi-speedometer2"></i>
                </button>
                <ul class="dropdown-menu">
                  <li *ngFor="let s of speed">
                    <a class="dropdown-item" (click)="setPlaybackRate(s)">
                      {{s}}x
                    </a>
                  </li>
                </ul>
              </div>
              <!-- Audio Language -->
              <div class="dropdown">
                <button class="btn btn-sm btn-dark dropdown-toggle p-1 me-2"
                        #speedToggleBtn
                        type="button"
                        data-bs-toggle="dropdown"
                        aria-expanded="false"
                        title="language audio">
                  <i class="bi bi-translate"></i>
                </button>
                <ul class="dropdown-menu" *ngIf="hasMultipleAudioTracks">
                  <li *ngFor="let audio of availableAudioTracks">
                    <a class="dropdown-item" (click)="changeAudioLanguage(audio.srclang)">
                      {{audio.label}}
                    </a>
                  </li>
                </ul>
              </div>

              <!-- Captions Toggle Button -->
              <div class="dropdown">
                <button class="btn btn-sm btn-dark dropdown-toggle p-1 me-2"
                        #ccToggleBtn
                        type="button"
                        data-bs-toggle="dropdown"
                        aria-expanded="false"
                        title="Closed Captions">
                  <i class="bi bi-badge-cc-fill"></i>
                </button>
                <ul class="dropdown-menu">
                  <li>
                    <a class="dropdown-item" (click)="toggleCaptions('off', $event)">Captions Off</a>
                  </li>
                  <li *ngFor="let track of currentVideo.tracks">
                    <a class="dropdown-item" (click)="toggleCaptions(track.srclang, $event)">
                      {{ track.label }}
                    </a>
                  </li>
                </ul>
              </div>

              <!-- Chapters -->
              <div class="dropdown">
                <button class="btn btn-sm btn-dark dropdown-toggle p-1 me-2"
                        #chapterBtn
                        type="button"
                        data-bs-toggle="dropdown"
                        aria-expanded="false"
                        title="chapter">
                  <i class="bi bi-skip-forward"></i>
                </button>
                <ul class="dropdown-menu">
                  <li *ngFor="let chapter of chapters">
                    <a class="dropdown-item" (click)="jumpToChapter(chapter.time)">
                      {{ chapter.title }} ({{ formatTime(chapter.time) }})
                    </a>
                  </li>
                </ul>
              </div>
              <!-- Fullscreen -->
              <button class="btn btn-sm btn-dark" (click)="toggleFullscreen()">
                <i class="bi bi-fullscreen"></i>
              </button>
            </div>
          </div>

          <!-- Video Selection -->
          <div class="mt-3">
            <label class="form-label">Select Video:</label>
            <select class="form-select" [(ngModel)]="selectedVideo" (change)="changeVideo()">
              <option *ngFor="let video of videoLibrary" [ngValue]="video">{{ video.title }}</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
